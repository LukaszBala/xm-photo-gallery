<h2 class="page__title">All Photos</h2>
<p class="page__subtitle">Click a photo to add it to your favorites.</p>
<app-photo-grid
  [photos]="photos()"
  [loading]="loading()"
  (photoClick)="onPhotoClick($event)"
/>
@if (hasMore()) {
<div
  appInfiniteScroll
  [intersectionMargin]="{ bottom: 200 }"
  (intersectionChange)="onIntersectionChange($event)"
></div>
} @else {
<div class="photos-page__footer">
  <p class="page__subtitle">
    Nothing to load (hit the artificial limit - can be changed in photos api) :)
  </p>
</div>
}
